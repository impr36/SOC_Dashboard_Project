<!-- SAVED FILES PAGE -->
<div class="saved-files-page">

    <!-- HEADER -->
    <div class="saved-files-header"
        style="display:flex;align-items:flex-start;justify-content:space-between;
        flex-wrap:wrap;gap:16px;margin-bottom:24px">

        <div>
            <h1 style="font-size:28px;font-weight:800;margin:0 0 6px">
                Saved Investigation Files
            </h1>
            <p style="color:#5a8a9f;margin:0;font-size:14px">
                Exported forensic artifacts, alert logs, CSV summaries,
                evidence files, and generated reports
            </p>
        </div>

        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <button onclick="loadSavedFiles()"
                style="background:#1e4d6b;color:#fff;border:none;border-radius:8px;
                padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600">
                🔄 Refresh
            </button>
            <button onclick="openFolder('forensics_exports')"
                style="background:#0d1f2d;border:1.5px solid #1e4d6b;color:#a0c8e8;
                border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px">
                📁 Open Exports Folder
            </button>
        </div>

    </div>

    <!-- STATS BAR -->
    <div id="sfStatsBar"
        style="display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap"></div>

    <!-- CONTROLS -->
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">

        <div style="display:flex;align-items:center;background:#0d1f2d;
            border:1.5px solid #1e4d6b;border-radius:10px;padding:0 14px;
            flex:1;min-width:220px;max-width:400px">
            <span style="color:#5a8a9f;margin-right:8px;font-size:16px">🔍</span>
            <input
                type="text"
                id="sfSearchInput"
                placeholder="Search files..."
                autocomplete="off"
                style="background:transparent;border:none;outline:none;color:#fff;
                font-size:14px;padding:10px 0;width:100%">
        </div>

        <select id="sfTypeFilter"
            style="background:#0d1f2d;border:1.5px solid #1e4d6b;border-radius:10px;
            color:#fff;padding:10px 14px;font-size:13px;cursor:pointer">
            <option value="ALL">All Types</option>
            <option value="JSON">JSON</option>
            <option value="CSV">CSV</option>
            <option value="TXT">TXT Report</option>
            <option value="PDF">PDF</option>
            <option value="PNG">PNG Chart</option>
            <option value="LOG">LOG</option>
            <option value="EVTX">EVTX</option>
            <option value="PCAP">PCAP</option>
        </select>

    </div>

    <!-- FILE LIST -->
    <div class="saved-files-list">
        <!-- Populated by saved_files.js -->
    </div>

</div>

<script>
// Update stats bar after files load
(function patchLoadSavedFiles(){
    const orig = window.loadSavedFiles
    if(!orig) return
    window.loadSavedFiles = async function(){
        await orig()
        // Update stats bar
        const bar = document.getElementById("sfStatsBar")
        if(!bar || !window._sfAllFiles) return
        const files = window._sfAllFiles
        const total = files.length
        const totalSize = files.reduce((acc,f)=>{
            const m = (f.size||"").match(/([\d.]+)\s*(B|KB|MB|GB)/)
            if(!m) return acc
            const n = parseFloat(m[1])
            const u = {B:1,KB:1024,MB:1024**2,GB:1024**3}[m[2]]||1
            return acc + n * u
        }, 0)

        function hs(b){ if(b<1024) return `${b}B`; if(b<1024**2) return `${(b/1024).toFixed(1)}KB`; return `${(b/1024**2).toFixed(2)}MB` }

        const statStyle = `background:#0d1f2d;border:1.5px solid #1e4d6b;border-radius:10px;
            padding:12px 20px;font-size:13px;color:#a0c8e8`

        bar.innerHTML = `
            <div style="${statStyle}">📦 <b style="color:#fff">${total}</b> files total</div>
            <div style="${statStyle}">💾 <b style="color:#fff">${hs(totalSize)}</b> total size</div>
            <div style="${statStyle}">🕐 Last export: <b style="color:#fff">${files[0]?.saved||"Never"}</b></div>
        `
    }
})()
</script>
