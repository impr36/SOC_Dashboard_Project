<!-- NIDS PAGE -->
<div class="nids-page">

    <div class="nids-header">
        <div class="nids-header-left">
            <h1>NIDS Investigation Console</h1>
            <p>Correlated network intrusion incidents and attack flow reconstruction</p>
        </div>
        <button onclick="loadNIDSIncidents()"
            style="background:#1e4d6b;color:#fff;border:none;border-radius:8px;
            padding:8px 18px;cursor:pointer;font-size:13px;margin-left:auto">
            🔄 Refresh
        </button>
    </div>

    <div class="nids-controls">

        <div class="nids-search-box">
            <img src="{{ url_for('static', path='icons-W/search.png') }}"
                class="nids-search-icon theme-icon">
            <input type="text" id="nidsSearchInput"
                placeholder="Search IPs, protocols, ports, attack chains, MITRE..."
                autocomplete="off">
        </div>

        <div class="nids-filter-section">

            <select id="nidsSeverityFilter">
                <option value="ALL">All Severity</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>

            <select id="nidsTimeFilter">
                <option value="1h">Last 1 Hour</option>
                <option value="3h">Last 3 Hours</option>
                <option value="6h">Last 6 Hours</option>
                <option value="12h">Last 12 Hours</option>
                <option value="24h" selected>Last 24 Hours</option>
            </select>

            <select id="nidsStatusFilter">
                <option value="ALL">All Status</option>
                <option value="New">New</option>
                <option value="Investigating">Investigating</option>
                <option value="Escalated">Escalated</option>
                <option value="True Positive">True Positive</option>
                <option value="False Positive">False Positive</option>
            </select>

        </div>

    </div>

    <div class="nids-table-wrapper">
        <table class="nids-table">
            <thead>
                <tr>
                    <th style="width:40px"></th>
                    <th>Group ID</th>
                    <th>Severity</th>
                    <th>Attack Flow</th>
                    <th style="text-align:center">Packets</th>
                    <th>Window</th>
                    <th>Confidence</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="nidsTableBody">
                <!-- Incidents load here -->
            </tbody>
        </table>
    </div>

</div>
