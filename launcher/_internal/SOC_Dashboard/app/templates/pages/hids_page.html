<!-- HIDS PAGE -->
<div class="hids-page">

    <div class="hids-header">
        <div class="hids-header-left">
            <h1>HIDS Investigation Console</h1>
            <p>Correlated host intrusion incidents and behavioral attack chains</p>
        </div>
        <button onclick="loadHIDSIncidents()"
            style="background:#1e4d6b;color:#fff;border:none;border-radius:8px;
            padding:8px 18px;cursor:pointer;font-size:13px;margin-left:auto">
            🔄 Refresh
        </button>
    </div>

    <div class="hids-controls">

        <div class="hids-search-box">
            <img src="{{ url_for('static', path='icons-W/search.png') }}"
                class="hids-search-icon theme-icon">
            <input type="text" id="hidsSearchInput"
                placeholder="Search groups, processes, users, MITRE techniques..."
                autocomplete="off">
        </div>

        <div class="hids-filter-section">

            <select id="severityFilter">
                <option value="ALL">All Severity</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>

            <select id="timeFilter">
                <option value="1h">Last 1 Hour</option>
                <option value="3h">Last 3 Hours</option>
                <option value="6h">Last 6 Hours</option>
                <option value="12h">Last 12 Hours</option>
                <option value="24h" selected>Last 24 Hours</option>
            </select>

            <select id="statusFilter">
                <option value="ALL">All Status</option>
                <option value="New">New</option>
                <option value="Investigating">Investigating</option>
                <option value="Escalated">Escalated</option>
                <option value="True Positive">True Positive</option>
                <option value="False Positive">False Positive</option>
            </select>

        </div>

    </div>

    <div class="hids-table-wrapper">
        <table class="hids-table">
            <thead>
                <tr>
                    <th style="width:40px"></th>
                    <th>Group ID</th>
                    <th>Severity</th>
                    <th>Attack Chain</th>
                    <th style="text-align:center">Events</th>
                    <th>Window</th>
                    <th>Confidence</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="hidsTableBody">
                <!-- Incidents load here -->
            </tbody>
        </table>
    </div>

</div>
