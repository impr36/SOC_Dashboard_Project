<div class="top-cards-section">

    <!-- LEFT -->

    <div class="top-left-section">

        <div class="severity-wrapper">

            <div class="severity-card">

                <div class="severity-title">
                    Severity
                </div>

                <div class="severity-title">
                    Breakdown
                </div>

            </div>


            <div class="severity-levels">

                <div class="severity-pill">
                    Low : <span id="lowCount">0</span>
                </div>

                <div class="severity-pill">
                    Medium : <span id="mediumCount">0</span>
                </div>

                <div class="severity-pill">
                    High : <span id="highCount">0</span>
                </div>

                <div class="severity-pill">
                    Critical : <span id="criticalCount">0</span>
                </div>

            </div>

        </div>

    </div>


    <!-- CENTER -->

    <div class="top-center-section">

        <div class="info-card">

            <div class="card-title">
                Total Alerts
            </div>

            <div
                class="card-value"
                id="totalAlerts"
            >
                0
            </div>

        </div>


        <div class="info-card">

            <div class="card-title">
                Last Scan
            </div>

            <div
                class="scan-text"
                id="lastScan"
            >
                N/A
            </div>

        </div>

    </div>


    <!-- RIGHT -->

<div class="top-right-section">

    <div class="system-card">

        <div class="system-title">
            System Details
        </div>

        <div class="system-line">

            Type :

            <span id="systemOS"></span>

        </div>

        <div class="system-line">

            IP :

            <span id="systemIP"></span>

        </div>

        <div class="system-line">

            Device :

            <span id="systemHost"></span>

        </div>

    </div>


    <div class="usage-section">

        <div class="memory-box">

            <div class="memory-top">

                <div class="memory-bar">

                    <div
                        class="memory-fill"
                        id="memoryFill"
                    ></div>

                </div>

                <span class="memory-percent" id="memoryPercent"></span>

            </div>

            <div class="memory-label">
                Memory Usage
            </div>

        </div>


        <div class="disk-box">

            <div class="disk-title">
                Disk Storage
            </div>

            <div
                class="disk-circle"
                id="diskCircle"
            >

                <div class="disk-inner" id="diskPercent"></div>

            </div>

        </div>

    </div>

</div>

</div>
